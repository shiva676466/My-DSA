name: Daily Commit

on:
  schedule:
    - cron: '0 18 * * *'  # Runs daily (UTC time)
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          echo "Update: $(date)" >> daily.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Daily auto commit"
          git push
